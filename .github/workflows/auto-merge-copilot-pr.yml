name: Auto Merge Copilot PR After Approval

on:
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  auto-merge:
    if: >-
      github.event.review.state == 'approved' &&
      contains(fromJSON('["copilot-swe-agent[bot]","copilot[bot]","github-copilot[bot]","copilot"]'), github.event.pull_request.user.login)
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Merge Approved Copilot PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.COPILOT_TOKEN }}
          script: |
            const prNumber = context.payload.pull_request.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Helper: wait for a given number of seconds
            function sleep(seconds) {
              return new Promise(resolve => setTimeout(resolve, seconds * 1000));
            }

            // Get PR details
            let { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });

            // If the PR is still a draft, mark it as ready for review
            if (pr.draft) {
              console.log(`PR #${prNumber} is a draft. Marking as ready for review...`);
              await github.graphql(`
                mutation($prId: ID!) {
                  markPullRequestReadyForReview(input: { pullRequestId: $prId }) {
                    pullRequest { number }
                  }
                }
              `, { prId: pr.node_id });
              console.log(`PR #${prNumber} marked as ready. Waiting for GitHub to update state...`);

              // Wait and re-fetch until it's no longer a draft (max 60s)
              for (let i = 0; i < 6; i++) {
                await sleep(10);
                const { data: updated } = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });
                if (!updated.draft) {
                  pr = updated;
                  console.log(`PR #${prNumber} is now ready for review.`);
                  break;
                }
                console.log(`Still draft, retrying... (${(i + 1) * 10}s)`);
              }

              if (pr.draft) {
                core.setFailed(`PR #${prNumber} is still a draft after waiting. Please mark it ready manually.`);
                return;
              }
            }

            if (pr.mergeable_state === 'blocked') {
              console.log(`PR #${prNumber} is blocked (pending required checks). Enabling auto-merge...`);
              try {
                await github.graphql(`
                  mutation($prId: ID!) {
                    enablePullRequestAutoMerge(input: { pullRequestId: $prId, mergeMethod: SQUASH }) {
                      pullRequest { number }
                    }
                  }
                `, { prId: pr.node_id });
                console.log(`Auto-merge enabled on PR #${prNumber}. Will merge when checks pass.`);
              } catch (e) {
                console.log(`Could not enable auto-merge: ${e.message}`);
              }
              return;
            }

            // Wait for mergeable state if unknown
            if (pr.mergeable === null) {
              console.log(`Mergeable state unknown, waiting...`);
              for (let i = 0; i < 6; i++) {
                await sleep(10);
                const { data: updated } = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });
                if (updated.mergeable !== null) {
                  pr = updated;
                  break;
                }
              }
            }

            if (!pr.mergeable) {
              core.setFailed(`PR #${prNumber} is not mergeable. State: ${pr.mergeable_state}`);
              return;
            }

            // Merge the PR using squash
            await github.rest.pulls.merge({
              owner,
              repo,
              pull_number: prNumber,
              merge_method: 'squash',
              commit_title: `fix: auto-merge Copilot PR #${prNumber}`,
              commit_message: `Automatically merged after human approval.\nCloses #${pr.body?.match(/#(\d+)/)?.[1] || 'unknown'}`
            });

            console.log(`PR #${prNumber} merged successfully!`);

            // Close the related issue if linked
            const issueMatch = pr.body?.match(/#(\d+)/);
            if (issueMatch) {
              try {
                await github.rest.issues.update({
                  owner,
                  repo,
                  issue_number: Number(issueMatch[1]),
                  state: 'closed'
                });
                console.log(`Closed related issue #${issueMatch[1]}`);
              } catch (e) {
                console.log(`Could not close issue: ${e.message}`);
              }
            }

      - name: Trigger Test Rerun to Verify Fix
        if: success()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.COPILOT_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'hourly-test-fix.yml',
              ref: 'main'
            });
            console.log('Triggered test workflow to verify the fix.');
