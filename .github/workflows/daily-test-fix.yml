name: Daily Test And Auto Fix

run-name: >-
  ${{ github.event.inputs.rerun_count != '' && github.event.inputs.rerun_count != '0'
      && format('Rerun {0} - Verify Fix', github.event.inputs.rerun_count)
      || 'Daily Test And Auto Fix' }}

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      rerun_count:
        description: 'Rerun attempt number'
        required: false
        default: '0'

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  run-tests:
    runs-on: ubuntu-latest
    outputs:
      tests_failed: ${{ steps.run.outcome == 'failure' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Install Playwright Browsers
        run: mvn org.codehaus.mojo:exec-maven-plugin:3.0.0:java -Dexec.mainClass=com.microsoft.playwright.CLI -Dexec.args="install --with-deps"

      - name: Run Tests
        id: run
        run: |
          if [ "${{ github.event.inputs.rerun_count }}" != "0" ] && [ "${{ github.event.inputs.rerun_count }}" != "" ]; then
            echo "Rerun detected — checking for failed tests XML from previous run..."
            # Download the failed tests XML from the latest previous run
            WORKFLOW_ID=$(gh api repos/${{ github.repository }}/actions/workflows --jq '.workflows[] | select(.name=="Daily Test And Auto Fix") | .id')
            RUN_ID=$(gh api "repos/${{ github.repository }}/actions/workflows/${WORKFLOW_ID}/runs?per_page=5&status=completed" --jq '.workflow_runs[0].id')
            if [ -n "$RUN_ID" ]; then
              gh run download "$RUN_ID" -n testng-failed-xml -D testng-failed-artifact 2>/dev/null || true
            fi
            if [ -f "testng-failed-artifact/testng-failed.xml" ]; then
              echo "Running only failed tests from previous run..."
              mvn test -DsuiteXmlFile=testng-failed-artifact/testng-failed.xml
            else
              echo "No failed tests XML found, running all tests..."
              mvn clean test
            fi
          else
            mvn clean test
          fi
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.COPILOT_TOKEN }}

      - name: Save test outcome
        if: always()
        run: echo "Test outcome: ${{ steps.run.outcome }}" > test-outcome.txt

      - name: Upload Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            test-outcome.txt
            target/surefire-reports/
            test-output/
            reports/
          if-no-files-found: warn

      - name: Upload Failed Tests XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: testng-failed-xml
          path: target/surefire-reports/testng-failed.xml
          if-no-files-found: ignore

  open-issue-and-assign-copilot:
    needs: run-tests
    if: needs.run-tests.outputs.tests_failed == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: test-reports
          path: artifacts

      - name: Create Or Update Issue
        id: issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.COPILOT_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');

            function walk(dir) {
              if (!fs.existsSync(dir)) return [];
              let out = [];
              for (const e of fs.readdirSync(dir, { withFileTypes: true })) {
                const p = path.join(dir, e.name);
                out = e.isDirectory() ? out.concat(walk(p)) : out.concat(p);
              }
              return out;
            }

            let body = `## Automated Test Failure\n\n`;
            body += `**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\n`;
            body += `Analyze the failures below, identify the root cause, fix the source code, and open a PR.\n\n`;

            const files = walk('artifacts').filter(f => f.endsWith('.txt') || f.endsWith('.xml'));

            for (const file of files.slice(0, 8)) {
              const content = fs.readFileSync(file, 'utf8').slice(0, 3000);
              if (
                content.includes('FAILURE') ||
                content.includes('ERROR') ||
                content.includes('<failure')
              ) {
                body += `### ${path.basename(file)}\n\`\`\`\n${content}\n\`\`\`\n\n`;
              }
            }

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'auto-test-failure',
              state: 'open'
            });

            let issueNumber;

            if (existing.data.length > 0) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                title: 'Test failures detected',
                body,
                labels: ['bug', 'auto-test-failure']
              });
              issueNumber = existing.data[0].number;
              console.log(`Existing issue #${issueNumber} updated with latest failure details.`);
            } else {
              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'Test failures detected',
                body,
                labels: ['bug', 'auto-test-failure']
              });
              issueNumber = created.data.number;
              console.log(`New issue #${issueNumber} created with test failure details.`);
            }

            core.setOutput('issue_number', String(issueNumber));

      - name: Assign Copilot To Issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.COPILOT_TOKEN }}
          script: |
            const issueNumber = Number('${{ steps.issue.outputs.issue_number }}');

            await github.request('POST /repos/{owner}/{repo}/issues/{issue_number}/assignees', {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              assignees: ['copilot-swe-agent[bot]'],
              agent_assignment: {
                target_repo: `${context.repo.owner}/${context.repo.repo}`,
                base_branch: 'main'
              },
              headers: {
                'X-GitHub-Api-Version': '2022-11-28'
              }
            });

            console.log(`Copilot coding agent assigned to issue #${issueNumber}. Waiting for Copilot to analyze and open a PR.`);