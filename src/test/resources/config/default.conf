# =====================================================================
# Default configuration shared across all environments.
# Environment-specific files (dev.conf / qa.conf / prod.conf) inherit
# from this file and may override any value.
#
# Override the active environment via:   mvn test -Denv=qa
# Override individual values via system property:
#     mvn test -Dapp.baseUrl=https://staging.example.com
# Secrets must come from environment variables (never commit them):
#     ${?AUTOMATION_PASSWORD}
# =====================================================================

app {
  # Target site under test
  baseUrl = "https://automationexercise.com"
  apiBaseUrl = "https://automationexercise.com/api"

  # Browser & runtime defaults
  browser = "chromium"          # chromium | firefox | webkit
  headless = true
  slowMoMs = 0
  viewport {
    width = 1440
    height = 900
  }

  # Timeouts (milliseconds)
  timeouts {
    default = 60000
    navigation = 60000
    expect = 10000
  }

  # Diagnostics on failure
  capture {
    screenshotOnFailure = true
    traceOnFailure = true
    videoOnFailure = true
    screenshotEveryStep = false
  }

  # Test data defaults (non-secret)
  testData {
    defaultSearchTerm = "Top"
    contactEmail = "qa-bot@example.com"
  }

  # Credentials -- ALWAYS sourced from environment variables.
  # Never commit real values here.
  credentials {
    username = ${?AUTOMATION_USERNAME}
    password = ${?AUTOMATION_PASSWORD}
  }

  # Jira / Zephyr context (used for traceability badges in reports
  # and as context for the AI agent). Override per environment if needed.
  jira {
    enabled = true
    baseUrl = "https://kaurharinder91.atlassian.net"
    projectKey = "SCRUM"
    apiToken = ${?JIRA_API_TOKEN}
    userEmail = ${?JIRA_USER_EMAIL}
  }
  zephyr {
    enabled = false
    flavour = "scale"           # scale | squad
    apiToken = ${?ZEPHYR_API_TOKEN}
  }
}
